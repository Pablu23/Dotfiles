$font = Noto Sans

general {
  hide_cursor = true
}

animations {
    enabled = true
    bezier = ease, 0.25, 0.1, 0.25, 1.0
    animation = fadeIn, 1, 4, ease
    animation = fadeOut, 1, 4, ease
    animation = inputFieldDots, 1, 2, ease
}

background {
    monitor = DP-7
    path = screenshot
    blur_passes = 4
    contrast = 0.95
    brightness = 0.55
    vibrancy = 0.18
    vibrancy_darkness = 0.2
}

background {
    monitor = DP-6
    path = screenshot
    blur_passes = 4
    contrast = 0.95
    brightness = 0.50
    vibrancy = 0.16
    vibrancy_darkness = 0.25
}

# Main monitor: DP-7
label {
    monitor = DP-7
    text = $TIME
    color = rgba(245, 247, 250, 0.92)
    font_size = 96
    font_family = $font
    position = 0, -130
    halign = center
    valign = top
}

label {
    monitor = DP-7
    text = cmd[update:60000] date +"%A, %d %B"
    color = rgba(220, 225, 232, 0.78)
    font_size = 24
    font_family = $font
    position = 0, -295
    halign = center
    valign = top
}

input-field {
    monitor = DP-7
    size = 420, 58
    outline_thickness = 2
    rounding = 14

    outer_color = rgba(33ccffee) rgba(00ff99ee) 45deg
    check_color = rgba(00ff99ee) rgba(33ccffee) 45deg
    fail_color = rgba(ff6633ee) rgba(ff0066ee) 45deg

    inner_color = rgba(12, 14, 18, 0.58)
    font_color = rgba(245, 247, 250, 0.90)
    font_family = $font

    dots_size = 0.22
    dots_spacing = 0.24
    dots_center = true

    fade_on_empty = false
    placeholder_text = <span foreground="##dce1e8">Password</span>
    fail_text = <span foreground="##ff8a8a">$PAMFAIL</span>

    position = 0, -95
    halign = center
    valign = center
}

label {
    monitor = DP-7
    text = $LAYOUT
    color = rgba(220, 225, 232, 0.55)
    font_size = 16
    font_family = $font
    position = -32, 28
    halign = right
    valign = bottom
}

# Secondary rotated monitor: DP-6
label {
    monitor = DP-6
    text = $TIME
    color = rgba(245, 247, 250, 0.74)
    font_size = 58
    font_family = $font
    position = 0, -80
    halign = center
    valign = center
}

label {
    monitor = DP-6
    text = cmd[update:60000] date +"%d %b"
    color = rgba(220, 225, 232, 0.58)
    font_size = 22
    font_family = $font
    position = 0, -145
    halign = center
    valign = center
}
